# ============================================
# TokyoNight tmux (Purple Primary Theme)
# ============================================

# ============================================
# True Color
# ============================================
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# ============================================
# COLOR ROLE SHIFT
# ============================================
# PRIMARY (was blue) → PURPLE
# SECONDARY → CYAN
# WARNING → RED

# bg        #1A1B26
# fg        #C0CAF5
# primary   #BB9AF7  (purple)
# cyan      #7DCFFF
# red       #F7768E
# selection #33467C

# ============================================
# STATUS BAR
# ============================================
set -g status on
set -g status-position bottom
set -g status-interval 2
set -g status-style bg=#1A1B26,fg=#C0CAF5

# --------------------------------------------
# LEFT: Session (PRIMARY = purple)
# --------------------------------------------
set -g status-left-length 40
set -g status-left "#[fg=#15161E,bg=#BB9AF7,bold]  #S #[fg=#BB9AF7,bg=#1A1B26]"

# --------------------------------------------
# RIGHT: Time (cyan accent)
# --------------------------------------------
set -g status-right-length 80
set -g status-right "#[fg=#A9B1D6] %m-%d  #[fg=#7DCFFF]%H:%M "

# ============================================
# WINDOWS
# ============================================

# inactive
set -g window-status-style fg=#A9B1D6,bg=#1A1B26
set -g window-status-format " #I:#W "

# active (PRIMARY = purple)
set -g window-status-current-style fg=#1A1B26,bg=#BB9AF7,bold
set -g window-status-current-format "#[fg=#BB9AF7]#[fg=#1A1B26,bg=#BB9AF7] #I:#W #[fg=#BB9AF7,bg=#1A1B26]"

# activity alert (keep red)
set -g window-status-activity-style fg=#F7768E,bg=#1A1B26

# ============================================
# PANES
# ============================================

set -g pane-border-style fg=#15161E
set -g pane-active-border-style fg=#BB9AF7

# ============================================
# COPY MODE
# ============================================
set -g mode-style bg=#33467C,fg=#C0CAF5

# ============================================
# MESSAGES
# ============================================
set -g message-style bg=#1A1B26,fg=#BB9AF7,bold

# ============================================
# UX
# ============================================
set -g mouse on
set -g history-limit 10000
set -g renumber-windows on
setw -g monitor-activity on
set -g visual-activity on