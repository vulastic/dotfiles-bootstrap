set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

set -g status-position top
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left-length 60
set -g status-right-length 120
set -g status-left "#[fg=#7aa2f7,bg=#1f2335,bold] #S #[fg=#1f2335,bg=#1a1b26]"
set -g status-right "#[fg=#565f89,bg=#1a1b26] %Y-%m-%d #[fg=#bb9af7,bg=#1a1b26] %H:%M "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I #W "
setw -g window-status-format "#[fg=#a9b1d6,bg=#1a1b26] #I #W "
setw -g window-status-separator ""

set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1f2335,fg=#c0caf5"
set -g mode-style "bg=#2ac3de,fg=#1a1b26"
