# Starship configuration - Tokyo Night Lean Theme
# Final Confirmed Layout (Simplified)

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

right_format = """
$jobs\
$nix_shell\
$container\
$nodejs\
$python\
$rust\
$docker_context\
$cmd_duration\
$status\
$time"""

# --- Palette Definition ---
# Blue: #7aa2f7
# Cyan: #7dcfff
# Magenta: #bb9af7
# Red: #f7768e
# Green: #9ece6a
# Yellow: #e0af68
# Orange: #ff9e64
# Grey: #565f89

[os]
disabled = false
style = "bold #7aa2f7"

[os.symbols]
AIX = " "
AlmaLinux = " "
Alpaquita = " "
