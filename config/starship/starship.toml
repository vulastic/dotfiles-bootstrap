RedHatEnterprise = "󱄛 "
Redox = "󰀘 "
RockyLinux = " "
Solus = " "
SUSE = " "
Ubuntu = " "
Ultramarine = " "
Unknown = " "
Uos = " "
Void = " "
Windows = "󰍲 "
Zorin = " "

[username]
show_always = true
style_user = "bold #bb9af7"
style_root = "bold #f7768e"
format = "[$user]($style) "

[hostname]
ssh_only = false
style = "bold #7aa2f7"
format = "at [$hostname]($style) "

[directory]
style = "bold #7dcfff"
truncation_length = 3
truncation_symbol = "…/"
read_only = " 󰌾"
format = "in [$path]($style) "

[git_branch]
symbol = " "
style = "bold #bb9af7"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold #f7768e"
format = "([$all_status$ahead_behind]($style)) "

[character]
success_symbol = "[›](bold #9ece6a)"
error_symbol = "[›](bold #f7768e)"
vicmd_symbol = "[›](bold #7aa2f7)"

# --- Right Side Modules ---

[jobs]
symbol = "󰓅 "
style = "bold #bb9af7"
format = "[$symbol($jobs)]($style) "

[nix_shell]
symbol = " "
style = "bold #7aa2f7"
format = "via [$symbol]($style) "

[container]
symbol = " "
style = "bold #7aa2f7"
format = "via [$symbol]($style) "

[nodejs]
symbol = " "
style = "bold #9ece6a"
format = "via [$symbol($version)]($style) "

[python]
symbol = " "
style = "bold #e0af68"
format = "via [$symbol($version)]($style) "

[rust]
symbol = "󱘗 "
style = "bold #ff9e64"
format = "via [$symbol($version)]($style) "

[docker_context]
symbol = " "
style = "bold #7aa2f7"
format = "via [$symbol]($style) "

[cmd_duration]
min_time = 500
style = "bold #e0af68"
format = "took [$duration]($style) "

[status]
disabled = false
symbol = " "
style = "bold #f7768e"
format = "[$symbol]($style) "

[time]
disabled = false
time_format = "%R" # HH:MM
style = "bold #565f89"
format = "at [$time]($style) "